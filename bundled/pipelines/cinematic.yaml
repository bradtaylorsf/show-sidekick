slug: cinematic
display_name: Cinematic
description: Cinematic trailer and tone-piece pipeline for reference-led visuals, title cards, dramatic pacing, and editor-ready rough cuts.
status: production
master_clock: none
default_checkpoint_policy: guided
extensions:
  custom_scripts: true
  custom_playbooks: true
  custom_skills: true
  custom_tools: false
required_skills:
  - pipelines/cinematic/executive-producer.md
  - pipelines/cinematic/idea-director.md
  - pipelines/cinematic/script-director.md
  - pipelines/cinematic/scene-director.md
  - pipelines/cinematic/asset-director.md
  - pipelines/cinematic/edit-director.md
  - pipelines/cinematic/compose-director.md
  - pipelines/cinematic/publish-director.md
  - meta/reviewer
  - meta/checkpoint-protocol
compatible_playbooks:
  recommended:
    - clean-professional
  also_works:
    - anime-ghibli
  custom_allowed: true
orchestration:
  mode: executive-producer
  skill: pipelines/cinematic/executive-producer.md
  budget_default_usd: 2
  max_revisions_per_stage: 2
  max_send_backs: 2
  max_wall_time_minutes: 20
sample:
  duration_s_min: 10
  duration_s_max: 15
  hint: Hook card, one motion beat, and a final title/tag frame.
export:
  supported_targets:
    - premiere
    - davinci
    - capcut
    - edl
  default_target: premiere
  notes: Export packages include edit decisions, linked assets, render notes, and NLE handoff metadata.
stages:
  - slug: idea
    skill: pipelines/cinematic/idea-director.md
    produces: brief
    produces_artifacts:
      - brief
    required_artifacts_in: []
    optional_artifacts_in: []
    required_tools: []
    optional_tools: []
    tools_available: []
    checkpoint_required: true
    sample_mode_supported: true
    review_focus:
      - Idea output fits the cinematic lane
      - Assumptions, risks, and handoff details are explicit
    success_criteria:
      - Schema-valid brief artifact
      - Idea handoff is ready for the next stage
    estimated_cost:
      sample:
        usd: 0
        comment: agent-authored planning only
      full:
        usd: 0
