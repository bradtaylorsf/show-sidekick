title: "bash - ai workflow demo"
prompt: "$"
accentColor: "#22D3EE"
capture_mode: synthetic_terminal
steps:
  - kind: pause
    seconds: 2.0
  - kind: cmd
    text: "git clone https://github.com/acme/ai-workflow-demo.git"
    typeSpeed: 0.04
    holdSeconds: 0.4
  - kind: out
    text: "Cloning into 'ai-workflow-demo'..."
    holdSeconds: 0.6
  - kind: out
    text: "Resolving starter files: done."
    holdSeconds: 0.6
  - kind: pill
    text: "starter ready"
    color: "#34D399"
    durationSeconds: 2.2
  - kind: pause
    seconds: 2.0
  - kind: cmd
    text: "predit build ai-workflow-demo/sample-episode --sample"
    typeSpeed: 0.035
    holdSeconds: 0.4
  - kind: out
    text: "render: synthetic terminal scene"
    holdSeconds: 0.6
  - kind: out
    text: "done: editor handoff prepared"
    holdSeconds: 1.0
  - kind: pause
    seconds: 2.5
