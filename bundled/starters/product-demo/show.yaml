slug: product-demo
display_name: Product Demo
description: Visual-led product demo starter with a screenshot fixture and concise demo notes.
created: 2026-05-14
sample_support: unsupported
brand: ./brand/
characters: ./characters/
skills: ./skills/
pipelines:
  screen-demo:
    playbook: clean-professional
    runtime: remotion
    aspect: 16:9
    budget_usd: 0.5
defaults:
  pipeline: screen-demo
  language: en
ingest:
  episode_template: ./episode.template.yaml
  watch:
    - path: ./inputs/
      match: "**/screenshot.jpg"
      pipeline: screen-demo
      slug_from: parent_dir
starter:
  fixture_size_bytes: 1834
  expected_sample_duration_s: 15
