name: Nightly L3V Drift

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "bundled/skills/agents/**"
      - "scripts/audit-l3v-drift.ts"
      - "scripts/github-pr-comment.ts"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  l3v-drift:
    name: Layer 3 skill inventory drift
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit L3V drift
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run audit:l3v-drift
