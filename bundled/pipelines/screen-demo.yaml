slug: screen-demo
display_name: Screen Demo
description: Screen-demo pipeline for product walkthroughs, terminal demos, UI recordings, synthetic screen fixtures, captions, and callouts.
status: production
sample_support: paid
master_clock: voiceover
default_checkpoint_policy: guided
extensions:
  custom_scripts: true
  custom_playbooks: true
  custom_skills: true
  custom_tools: false
required_skills:
  - pipelines/screen-demo/executive-producer.md
  - pipelines/screen-demo/idea-director.md
  - pipelines/screen-demo/script-director.md
  - pipelines/screen-demo/capture-director.md
  - pipelines/screen-demo/scene-director.md
  - pipelines/screen-demo/asset-director.md
  - pipelines/screen-demo/edit-director.md
  - pipelines/screen-demo/compose-director.md
  - pipelines/screen-demo/publish-director.md
  - meta/reviewer
  - meta/checkpoint-protocol
compatible_playbooks:
  recommended:
    - clean-professional
  also_works:
    - minimalist-diagram
  custom_allowed: true
orchestration:
  mode: executive-producer
  skill: pipelines/screen-demo/executive-producer.md
  budget_default_usd: 2
  max_revisions_per_stage: 2
  max_send_backs: 2
  max_wall_time_minutes: 20
sample:
  duration_s_min: 12
  duration_s_max: 18
  max_scenes: 3
  max_cost_usd: 0.9
  hint: A short synthetic terminal or screen walkthrough with timed callouts.
export:
  supported_targets:
    - premiere
    - davinci
    - capcut
    - edl
  default_target: premiere
  notes: Export packages include edit decisions, linked assets, render notes, and NLE handoff metadata.
stages:
  - slug: idea
    skill: pipelines/screen-demo/idea-director.md
    produces: brief
    produces_artifacts:
      - brief
    required_artifacts_in: []
    optional_artifacts_in: []
    required_tools: []
    optional_tools: []
    tools_available: []
    checkpoint_required: true
    sample_mode_supported: true
    review_focus:
      - Idea output fits the screen-demo lane
      - Assumptions, risks, and handoff details are explicit
    success_criteria:
      - Schema-valid brief artifact
      - Idea handoff is ready for the next stage
    estimated_cost:
      sample:
        usd: 0
        comment: agent-authored planning only
      full:
        usd: 0
        comment: agent-authored planning only
    human_approval: required
  - slug: script
