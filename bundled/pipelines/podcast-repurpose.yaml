slug: podcast-repurpose
display_name: Podcast Repurpose
description: Podcast repurposing pipeline for turning long-form audio or video into social clips, captioned excerpts, and editor handoff packages.
status: beta
sample_support: unsupported
master_clock: voiceover
default_checkpoint_policy: guided
extensions:
  custom_scripts: true
  custom_playbooks: true
  custom_skills: true
  custom_tools: false
required_skills:
  - pipelines/podcast-repurpose/executive-producer.md
  - pipelines/podcast-repurpose/source-review-director.md
  - pipelines/podcast-repurpose/idea-director.md
  - pipelines/podcast-repurpose/script-director.md
  - pipelines/podcast-repurpose/scene-director.md
  - pipelines/podcast-repurpose/asset-director.md
  - pipelines/podcast-repurpose/edit-director.md
  - pipelines/podcast-repurpose/compose-director.md
  - pipelines/podcast-repurpose/publish-director.md
  - meta/reviewer
  - meta/checkpoint-protocol
compatible_playbooks:
  recommended:
    - clean-professional
  also_works:
    - minimalist-diagram
  custom_allowed: true
orchestration:
  mode: executive-producer
  skill: pipelines/podcast-repurpose/executive-producer.md
  budget_default_usd: 1
  max_revisions_per_stage: 2
  max_send_backs: 2
  max_wall_time_minutes: 20
sample:
  duration_s_min: 15
  duration_s_max: 30
  max_scenes: 3
  max_cost_usd: 0.8
  hint: One excerpt, caption treatment, and support card.
export:
  supported_targets:
    - premiere
    - davinci
    - capcut
    - edl
  default_target: premiere
  notes: Export packages include edit decisions, linked assets, render notes, and NLE handoff metadata.
stages:
  - slug: source_review
    skill: pipelines/podcast-repurpose/source-review-director.md
    produces: source_media_review
    produces_artifacts:
      - source_media_review
    required_artifacts_in: []
    optional_artifacts_in: []
    required_tools: []
    optional_tools:
      - source_media_review
      - transcriber
      - frame_sampler
    tools_available:
      - source_media_review
      - transcriber
      - frame_sampler
    checkpoint_required: true
    sample_mode_supported: true
    review_focus:
      - Source Review output fits the podcast-repurpose lane
      - Assumptions, risks, and handoff details are explicit
    success_criteria:
      - Schema-valid source_media_review artifact
      - Source Review handoff is ready for the next stage
    estimated_cost:
      sample:
        usd: 0.25
        comment: sample-scope asset generation or capture
      full:
        usd: 2
        comment: full asset generation, capture, or processing pass
    human_approval: optional
  - slug: idea
    skill: pipelines/podcast-repurpose/idea-director.md
    produces: brief
    produces_artifacts:
