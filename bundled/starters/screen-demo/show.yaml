slug: screen-demo
display_name: Screen Demo
description: General screen-demo starter using a synthetic terminal fixture.
created: 2026-05-14
sample_support: paid
brand: ./brand/
characters: ./characters/
skills: ./skills/
pipelines:
  screen-demo:
    playbook: clean-professional
    runtime: remotion
    aspect: 16:9
    budget_usd: 0.5
    capture_mode: synthetic_terminal
defaults:
