slug: podcast-repurpose
display_name: Podcast Repurpose
description: "Footage-led podcast repurposing pipeline for turning long-form podcast episodes into chapter-aware clips, captioned shorts, and editor handoff packages. EP orchestration gates source review, chapter-based segmentation, transcript grounding, runtime locks, and publish packaging."
status: production
master_clock: none
default_checkpoint_policy: guided
extensions:
  custom_scripts: true
  custom_playbooks: true
  custom_skills: true
  custom_tools: false
required_skills:
  - pipelines/podcast-repurpose/executive-producer.md
  - pipelines/podcast-repurpose/source-review-director.md
  - pipelines/podcast-repurpose/idea-director.md
  - pipelines/podcast-repurpose/scene-director.md
  - pipelines/podcast-repurpose/asset-director.md
  - pipelines/podcast-repurpose/edit-director.md
  - pipelines/podcast-repurpose/compose-director.md
  - pipelines/podcast-repurpose/publish-director.md
  - meta/reviewer
  - meta/checkpoint-protocol
  - meta/source-media-review
compatible_playbooks:
  recommended:
    - clean-professional
    - flat-motion-graphics
  also_works:
    - news-broadcast
  custom_allowed: true
orchestration:
  mode: executive-producer
  skill: pipelines/podcast-repurpose/executive-producer.md
  budget_default_usd: 1.5
  max_revisions_per_stage: 3
  max_send_backs: 2
  max_wall_time_minutes: 15
export:
  supported_targets: [ premiere, davinci, capcut, edl ]
  default_target: capcut
  notes: |
    Export packages include selected podcast chapter windows, transcript excerpts, captions, reframed variants, render outputs, and NLE handoff metadata.
stages:
  - slug: source_review
    skill: pipelines/podcast-repurpose/source-review-director.md
    produces: source_media_review
    produces_artifacts:
      - source_media_review
    tools_available:
      - source_media_review
      - scene_detect
      - frame_sampler
      - transcriber
      - video_understand
    checkpoint_required: true
    human_approval: optional
    human_approval_default: false
    review_focus:
      - Podcast source is probed before clip strategy
      - Chapter markers, transcript topic boundaries, and visual continuity notes are recorded
      - scene_detect output identifies camera-angle and cut-boundary changes
    success_criteria:
      - Schema-valid source_media_review artifact for supplied podcast media
      - Chapter, transcript, and scene_detect evidence is ready for segmentation
    required_artifacts_in: []
    estimated_cost:
      sample:
        usd: 0
      full:
        usd: 0
  - slug: idea
    skill: pipelines/podcast-repurpose/idea-director.md
    produces: brief
    produces_artifacts:
      - brief
      - decision_log
    required_artifacts_in:
      - source_media_review
    checkpoint_required: true
    human_approval: required
    human_approval_default: true
    review_focus:
      - Clip promise is grounded in reviewed podcast source
      - Chapter strategy and target platforms are explicit
      - Source nuance is preserved rather than turned into unsupported clickbait
    success_criteria:
      - Schema-valid brief artifact
      - Brief records chapter strategy, clip count, target aspects, and runtime
    estimated_cost:
      sample:
        usd: 0
      full:
        usd: 0
  - slug: scene_plan
    skill: pipelines/podcast-repurpose/scene-director.md
    produces: scene_plan
    produces_artifacts:
      - scene_plan
    required_artifacts_in:
      - brief
      - source_media_review
    tools_available:
      - scene_detect
      - frame_sampler
      - transcriber
      - video_understand
    checkpoint_required: true
    human_approval: required
    human_approval_default: true
    review_focus:
      - chapter-based segmentation is used for clip windows
      - Transcript excerpts justify every selected segment
      - Scene boundaries preserve speaker meaning and visual continuity
    success_criteria:
      - Schema-valid scene_plan artifact
      - Every planned clip references chapter, transcript, or scene_detect evidence
    estimated_cost:
      sample:
        usd: 0
      full:
        usd: 0
  - slug: assets
    skill: pipelines/podcast-repurpose/asset-director.md
    produces: asset_manifest
    produces_artifacts:
      - asset_manifest
    required_artifacts_in:
      - scene_plan
      - source_media_review
    optional_artifacts_in:
      - brief
    optional_tools:
      - auto_reframe
      - subtitle_gen
      - video_selector
    tools_available:
      - auto_reframe
      - subtitle_gen
      - video_selector
    checkpoint_required: true
    human_approval: optional
    human_approval_default: false
    review_focus:
      - Captions map to the selected transcript spans
      - Reframed variants preserve active speaker and guest context
      - Support assets do not replace podcast source truth
    success_criteria:
      - Schema-valid asset_manifest artifact
      - Every clip asset maps to a reviewed podcast segment
    estimated_cost:
      sample:
        usd: 0
      full:
        usd: 0
  - slug: edit
    skill: pipelines/podcast-repurpose/edit-director.md
    produces: edit_decisions
    produces_artifacts:
      - edit_decisions
    required_artifacts_in:
      - scene_plan
      - asset_manifest
      - source_media_review
    optional_artifacts_in:
      - brief
    checkpoint_required: true
    human_approval: optional
    human_approval_default: false
    review_focus:
      - Selected windows preserve the original speaker meaning
      - Runtime and aspect variants stay consistent with approved decisions
      - silent runtime swap is a CRITICAL governance violation
    success_criteria:
      - Schema-valid edit_decisions artifact
      - Edit decisions cover every selected podcast clip
    estimated_cost:
      sample:
        usd: 0
      full:
        usd: 0
  - slug: compose
    skill: pipelines/podcast-repurpose/compose-director.md
    produces: render_report
    produces_artifacts:
      - render_report
      - final_review
    required_artifacts_in:
      - edit_decisions
      - asset_manifest
    optional_artifacts_in:
      - scene_plan
      - source_media_review
    required_tools:
      - video_compose
      - audio_mixer
    optional_tools:
      - auto_reframe
      - subtitle_gen
    tools_available:
      - auto_reframe
      - video_compose
      - audio_mixer
      - subtitle_gen
    requires_runtime: any
    checkpoint_required: true
    human_approval: optional
    human_approval_default: false
    review_focus:
      - Rendered clips preserve source timing, audio, and speaker focus
      - Captions remain readable in every aspect ratio
      - silent runtime swap is a CRITICAL governance violation
    success_criteria:
      - Schema-valid render_report artifact
      - Output files exist and pass ffprobe validation
    estimated_cost:
      sample:
        usd: 0
      full:
        usd: 0
  - slug: publish
    skill: pipelines/podcast-repurpose/publish-director.md
    produces: publish_log
    produces_artifacts:
      - publish_log
    required_artifacts_in:
      - render_report
      - final_review
    optional_artifacts_in:
      - brief
      - scene_plan
      - source_media_review
    checkpoint_required: true
    human_approval: required
    human_approval_default: true
    review_focus:
      - Deliverables are named by podcast episode, chapter, clip id, and platform
      - Transcript and source-window metadata are included
      - Known source, caption, or reframing caveats are surfaced
    success_criteria:
      - Schema-valid publish_log artifact
      - Export package contains rendered clips and handoff metadata
    estimated_cost:
      sample:
        usd: 0
      full:
        usd: 0
