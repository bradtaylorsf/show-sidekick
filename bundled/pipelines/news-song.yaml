slug: news-song
display_name: News Song
description: Audio-led news-song pipeline for topical music videos with sourced headline beats, lyrics, cuesheets, and rhythmic visual packaging.
status: production
sample_support: paid
master_clock: audio
stage_order: manifest
default_checkpoint_policy: guided
extensions:
  custom_scripts: true
  custom_playbooks: true
  custom_skills: true
  custom_tools: false
required_skills:
  - pipelines/news-song/executive-producer.md
  - pipelines/news-song/idea-director.md
  - pipelines/news-song/research-director.md
  - pipelines/news-song/script-director.md
  - pipelines/news-song/scene-director.md
  - pipelines/news-song/asset-director.md
  - pipelines/news-song/edit-director.md
  - pipelines/news-song/compose-director.md
  - pipelines/news-song/publish-director.md
  - meta/reviewer
  - meta/checkpoint-protocol
compatible_playbooks:
  recommended:
    - news-song
  also_works:
    - thechaosfm-gta-political
  custom_allowed: true
orchestration:
  mode: executive-producer
  skill: pipelines/news-song/executive-producer.md
  budget_default_usd: 2
  max_revisions_per_stage: 2
  max_send_backs: 2
  max_wall_time_minutes: 20
sample:
  duration_s_min: 15
  duration_s_max: 20
  max_scenes: 3
  max_cost_usd: 1
  hint: Hook plus first headline beat with no-caption preview support.
export:
  supported_targets:
    - premiere
    - davinci
    - capcut
    - edl
  default_target: premiere
  notes: Export packages include edit decisions, linked assets, render notes, and NLE handoff metadata.
