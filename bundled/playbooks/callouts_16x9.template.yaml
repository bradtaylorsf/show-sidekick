version: "1.0"
description: >
  Editable 16:9 source callouts for The News Jam.
  Edit source, headline, summary, date, url, time_start, time_end, position,
  and accent, then rerun the episode render command.

positions_supported:
  - upper_left
  - upper_right
  - middle

accents_supported:
  - amber
  - red
  - slate
  - cyan

defaults:
  position: upper_right
  accent: amber

callouts:
  - id: example-source-card
    source: Publisher Name
    headline: Short readable headline
    summary: One sentence explaining why this source appears at this lyric beat.
    date: Month D, YYYY
    url: https://example.com/article
    time_start: 12.50
    time_end: 16.50
    position: upper_right
    accent: amber

  - id: example-middle-card
    source: Publisher Name
    headline: Centered callout headline
    summary: Use middle sparingly when the background has clear safe space.
    date: Month D, YYYY
    url: https://example.com/article-2
    time_start: 42.00
    time_end: 46.00
    position: middle
    accent: red
