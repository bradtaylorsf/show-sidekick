name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ci:
    name: Typecheck, test, smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Changeset gate (changesets, version PR, or no-release)
        if: github.event_name == 'pull_request'
        run: pnpm changeset:gate

      - name: Install media binaries
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Provider docs check
        run: pnpm run docs:providers:check

      - name: Framework smoke E2E
        run: pnpm run test:smoke

      - name: Launch gates
        run: pnpm release:check
