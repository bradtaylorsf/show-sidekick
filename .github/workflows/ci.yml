name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ci:
    name: Typecheck, test, smoke, drift
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect no-release label
        if: github.event_name == 'pull_request'
        id: release_label
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          const labels = event.pull_request?.labels ?? [];
          const noRelease = labels.some((label) => label.name === "no-release");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `no_release=${noRelease}\n`);
          NODE

      - name: Changeset status
        if: github.event_name == 'pull_request' && steps.release_label.outputs.no_release != 'true'
        run: pnpm changeset:status

      - name: Install media binaries
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Provider docs check
        run: pnpm run docs:providers:check

      - name: Framework smoke E2E
        run: pnpm run test:smoke

      - name: Launch gates
        run: pnpm release:check

      - name: Coverage drift audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run audit:coverage-drift
