slug: daily-news
display_name: Daily News
description: Daily/recurring news roundup pipeline. Fetches top headlines via web_search, captures source-page screenshots via playwright-recording, scripts TTS narration, composes a fast-paced news montage with broadcast-style lower-third banners. Designed to run on a schedule (via /schedule skill) for hands-off daily episodes.
status: beta
master_clock: none
stage_order: manifest
default_checkpoint_policy: guided
reference_input:
  supported: false
extensions:
  custom_scripts: true
  custom_playbooks: true
  custom_skills: true
  custom_tools: true
required_skills:
  - pipelines/daily-news/executive-producer.md
  - pipelines/daily-news/idea-director.md
  - pipelines/daily-news/research-director.md
  - pipelines/daily-news/capture-director.md
  - pipelines/daily-news/script-director.md
  - pipelines/daily-news/scene-director.md
  - pipelines/daily-news/asset-director.md
  - pipelines/daily-news/edit-director.md
  - pipelines/daily-news/compose-director.md
  - pipelines/daily-news/publish-director.md
  - meta/reviewer
  - meta/checkpoint-protocol
compatible_playbooks:
  recommended:
    - news-broadcast
  also_works:
    - clean-professional
  custom_allowed: true
orchestration:
  mode: executive-producer
  skill: pipelines/daily-news/executive-producer.md
  budget_default_usd: 1.5
  max_revisions_per_stage: 2
  max_send_backs: 1
  max_wall_time_minutes: 20
export:
  supported_targets:
    - premiere
    - davinci
    - capcut
    - edl
  default_target: premiere
  notes: |
    Export packages include cut timing, linked assets, narration/music audio, and word timing captions where the target supports them.
stages:
  - slug: idea
    skill: pipelines/daily-news/idea-director.md
    produces: brief
    produces_artifacts:
      - brief
    tools_available: []
    checkpoint_required: true
    human_approval: required
    human_approval_default: true
    review_focus:
      - Topic scope defined, such as tech AI news, general world news, crypto, or another explicit beat
      - Source list specified with publisher names or RSS feeds, minimum 3
      - Recency window set, last 24h by default for daily or 7d for weekly
      - Episode length target set, typically 5-15 min
      - Target platform and aspect ratio confirmed
      - TTS voice id confirmed
    success_criteria:
      - Schema-valid brief artifact
      - metadata.topic_scope present
      - metadata.sources is a non-empty array
      - metadata.episode_date present in ISO format
      - metadata.target_runtime_seconds set
    required_artifacts_in: []
    optional_artifacts_in: []
    required_tools: []
    optional_tools: []
    estimated_cost:
      sample:
        usd: 0
        comment: agent-authored planning only
      full:
        usd: 0
        comment: agent-authored planning only
    sample_mode_supported: true
  - slug: research
    skill: pipelines/daily-news/research-director.md
    produces: research_brief
    produces_artifacts:
      - research_brief
    required_artifacts_in:
      - brief
    required_tools:
      - web_search
    tools_available:
      - web_search
    checkpoint_required: true
    human_approval: required
    human_approval_default: true
    review_focus:
      - At least 8-12 candidate headlines fetched before slate selection
      - Every headline has source URL, publisher, publish date, brief summary
      - Headlines deduplicated, with the same story across multiple publishers collapsed
      - Recency window honored and stale stories dropped
      - Headlines categorized if user requested
    success_criteria:
      - research_brief.headlines is a non-empty array
      - Each headline has url, publisher, date, summary fields populated
    optional_artifacts_in: []
    optional_tools: []
    estimated_cost:
      sample:
        usd: 0
        comment: agent-authored planning only
      full:
        usd: 0
        comment: agent-authored planning only
    sample_mode_supported: true
  - slug: capture
    skill: pipelines/daily-news/capture-director.md
    produces: capture_manifest
    produces_artifacts:
      - capture_manifest
    required_artifacts_in:
      - research_brief
    required_tools:
      - playwright_recording
    tools_available:
      - playwright_recording
    checkpoint_required: false
    human_approval: optional
    human_approval_default: false
    review_focus:
      - Captures are real source screenshots. Do not generate fake article pages.
      - One above-the-fold screenshot per selected story
      - Screenshots match target_platform dimensions
      - Failed loads, paywalls, geo-blocks, and page errors are flagged for the script stage
      - Screenshots are saved under the episode asset folder
    success_criteria:
      - capture_manifest.screenshots length matches research_brief.selected_stories
      - All screenshot files exist on disk
    optional_artifacts_in: []
    optional_tools: []
    estimated_cost:
      sample:
        usd: 0.25
        comment: sample-scope asset generation or capture
      full:
        usd: 2
        comment: full asset generation, capture, or processing pass
    sample_mode_supported: true
  - slug: script
    skill: pipelines/daily-news/script-director.md
    produces: script
    produces_artifacts:
      - script
    required_artifacts_in:
      - research_brief
      - capture_manifest
    tools_available: []
    checkpoint_required: true
    human_approval: required
    human_approval_default: true
    review_focus:
      - Each story has a 5-10 sec narration block
      - Tone is neutral and authoritative, newsreader not opinion
      - Source attributed in every script block
      - Episode opens with date and intro line and closes with sign-off
      - No editorializing and no clickbait phrasing
      - If source attribution is sensitive, script states that
    success_criteria:
      - Schema-valid script artifact
      - script.intro and script.outro both present
      - script.stories length matches capture_manifest.screenshots length
    optional_artifacts_in: []
    required_tools: []
    optional_tools: []
    estimated_cost:
      sample:
        usd: 0
        comment: agent-authored planning only
      full:
        usd: 0
        comment: agent-authored planning only
    sample_mode_supported: true
  - slug: scene_plan
    skill: pipelines/daily-news/scene-director.md
    produces: scene_plan
    produces_artifacts:
      - scene_plan
    required_artifacts_in:
      - script
      - capture_manifest
    tools_available: []
    checkpoint_required: false
    human_approval: optional
    human_approval_default: false
    review_focus:
      - Episode timeline assembled with intro card, story cards, and outro card
      - Each story scene shows the screenshot full-frame with broadcast lower-third overlay
      - Lower-third banner format identical across all stories
      - Logo and clock fixed top-right across the episode
      - Music bed timing planned
    success_criteria:
      - Schema-valid scene_plan artifact
      - Total scene duration matches sum of script narration durations within 5%
    optional_artifacts_in: []
    required_tools: []
    optional_tools: []
    estimated_cost:
      sample:
        usd: 0
        comment: agent-authored planning only
      full:
        usd: 0
        comment: agent-authored planning only
    sample_mode_supported: true
  - slug: assets
    skill: pipelines/daily-news/asset-director.md
    produces: asset_manifest
    produces_artifacts:
      - asset_manifest
    required_artifacts_in:
      - script
      - scene_plan
    required_tools:
      - tts_selector
    optional_tools:
      - audio_mixer
      - audio_enhance
    tools_available:
      - tts_selector
      - audio_mixer
      - audio_enhance
    checkpoint_required: false
    human_approval: optional
    human_approval_default: false
    review_focus:
      - One TTS audio file per script block
      - Same voice id used across all blocks
      - Newsreader cadence is consistent
      - Audio normalized to broadcast loudness
      - Optional newsroom-bed music identified or intentionally skipped
    success_criteria:
      - Schema-valid asset_manifest artifact
      - All TTS audio files exist on disk
      - All audio files use the same voice id
    optional_artifacts_in: []
    estimated_cost:
      sample:
        usd: 0.25
        comment: sample-scope asset generation or capture
      full:
        usd: 2
        comment: full asset generation, capture, or processing pass
    sample_mode_supported: true
  - slug: edit
    skill: pipelines/daily-news/edit-director.md
    produces: edit_decisions
    produces_artifacts:
      - edit_decisions
    required_artifacts_in:
      - scene_plan
      - asset_manifest
    tools_available: []
    checkpoint_required: false
    human_approval: optional
    human_approval_default: false
    review_focus:
      - render_runtime selected, with Remotion recommended for chrome and lower-thirds
      - silent runtime swap is a CRITICAL governance violation
      - Lower-third banner timing locked
      - Audio bed ducked during every narration block
      - Hard cuts between stories in news broadcast style
      - Episode duration matches sum of TTS audio plus intro/outro buffer
    success_criteria:
      - Schema-valid edit_decisions artifact
      - edit_decisions.render_runtime present
    optional_artifacts_in: []
    required_tools: []
    optional_tools: []
    estimated_cost:
      sample:
        usd: 0
        comment: agent-authored planning only
      full:
        usd: 0
        comment: agent-authored planning only
    sample_mode_supported: true
  - slug: compose
    skill: pipelines/daily-news/compose-director.md
    produces: render_report
    produces_artifacts:
      - render_report
      - final_review
    required_artifacts_in:
      - edit_decisions
      - asset_manifest
    optional_artifacts_in:
      - scene_plan
    required_tools:
      - video_compose
      - audio_mixer
    optional_tools:
      - video_stitch
    tools_available:
      - video_compose
      - audio_mixer
      - video_stitch
    checkpoint_required: true
    human_approval: optional
    human_approval_default: false
    review_focus:
      - Output duration matches planned within 2 sec
      - Audio mix verified, narration clear and music ducked correctly
      - Lower-third banners render with consistent typography across all stories
      - No screenshot has visible browser chrome, URL bar, scrollbar, or cookie banner unless intentional
      - Episode date visible in opening card and matches brief
    success_criteria:
      - Schema-valid render_report artifact
      - Output file exists and passes ffprobe validation
    estimated_cost:
      sample:
        usd: 0.05
        comment: local render validation
      full:
        usd: 0.25
        comment: full render and export pass
    sample_mode_supported: true
  - slug: publish
    skill: pipelines/daily-news/publish-director.md
    produces: publish_log
    produces_artifacts:
      - publish_log
    required_artifacts_in:
      - render_report
      - final_review
    optional_artifacts_in:
      - brief
      - script
      - capture_manifest
    checkpoint_required: true
    human_approval: required
    human_approval_default: true
    review_focus:
      - Rendered episode, source URLs, screenshots, and captions are packaged together
      - Publisher attribution and episode date survive into delivery metadata
      - Review notes identify any capture-quality or source-access caveats
    success_criteria:
      - Schema-valid publish_log artifact
      - Export package contains rendered video, source manifest, screenshots, and metadata
    required_tools: []
    optional_tools: []
    tools_available: []
    estimated_cost:
      sample:
        usd: 0
        comment: agent-authored planning only
      full:
        usd: 0
        comment: agent-authored planning only
    sample_mode_supported: true
sample:
  duration_s_min: 15
  duration_s_max: 20
  hint: Three sourced headlines, one captured card, and a short broadcast preview.
