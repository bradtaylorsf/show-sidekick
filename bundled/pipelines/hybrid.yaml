slug: hybrid
display_name: Hybrid
description: "Hybrid pipeline for videos that combine source footage with designed or generated support assets: interviews plus diagrams, product footage plus overlays, screen recordings plus companion graphics, or montage edits with support inserts. EP orchestration adds quality gates for source/support balance, overlay density, and cross-medium coherence."
status: production
master_clock: none
default_checkpoint_policy: guided
extensions:
  custom_scripts: true
  custom_playbooks: true
  custom_skills: true
  custom_tools: false
required_skills:
  - pipelines/hybrid/executive-producer.md
  - pipelines/hybrid/source-review-director.md
  - pipelines/hybrid/idea-director.md
  - pipelines/hybrid/script-director.md
  - pipelines/hybrid/scene-director.md
  - pipelines/hybrid/asset-director.md
  - pipelines/hybrid/edit-director.md
  - pipelines/hybrid/compose-director.md
  - pipelines/hybrid/publish-director.md
  - meta/reviewer
  - meta/checkpoint-protocol
compatible_playbooks:
  recommended:
    - clean-professional
    - flat-motion-graphics
  also_works:
    - minimalist-diagram
  custom_allowed: true
orchestration:
  mode: executive-producer
  skill: pipelines/hybrid/executive-producer.md
  budget_default_usd: 2
  max_revisions_per_stage: 3
  max_send_backs: 3
  max_wall_time_minutes: 12
export:
  supported_targets:
    - premiere
    - davinci
    - capcut
    - edl
  default_target: premiere
  notes: |
    Export packages include cut timing, linked assets, narration/music audio, and word timing captions where the target supports them.
stages:
  - slug: source_review
    skill: pipelines/hybrid/source-review-director.md
    produces: source_media_review
    produces_artifacts:
      - source_media_review
    tools_available:
      - source_media_review
      - frame_sampler
      - transcriber
      - scene_detect
      - video_understand
    review_focus:
      - Supplied footage is probed before planning
      - Content summary is grounded in technical probe fields
      - Reusable source moments are identified for the script and scene plan
    success_criteria:
      - Schema-valid source_media_review artifact when user media is supplied
      - Known source constraints are explicit before script
    human_approval: optional
    human_approval_default: false
    required_artifacts_in: []
    optional_artifacts_in: []
    required_tools: []
    optional_tools: []
    estimated_cost:
      sample:
        usd: 0.25
        comment: sample-scope asset generation or capture
      full:
        usd: 2
        comment: full asset generation, capture, or processing pass
    sample_mode_supported: true
  - slug: idea
    skill: pipelines/hybrid/idea-director.md
    produces: brief
    produces_artifacts:
      - brief
      - decision_log
    optional_artifacts_in:
      - source_media_review
    checkpoint_required: true
    human_approval: required
    human_approval_default: true
    review_focus:
      - Anchor medium is clearly identified
      - Support layers are justified and realistic
      - Output mix matches the source inventory
    success_criteria:
      - Schema-valid brief artifact
      - Brief distinguishes source-led and support-led elements
    required_artifacts_in: []
    required_tools: []
    optional_tools: []
    tools_available: []
    estimated_cost:
      sample:
        usd: 0
        comment: agent-authored planning only
      full:
        usd: 0
        comment: agent-authored planning only
    sample_mode_supported: true
  - slug: script
    skill: pipelines/hybrid/script-director.md
    produces: script
    produces_artifacts:
      - script
    required_artifacts_in:
      - brief
    optional_tools:
      - transcriber
      - scene_detect
      - audio_enhance
    tools_available:
      - transcriber
      - scene_detect
      - audio_enhance
    checkpoint_required: true
    human_approval: required
    human_approval_default: true
    review_focus:
      - Source-led beats and support-led beats are clearly separated
      - Narration or dialogue plan is realistic
      - The script does not rely on unsupported assets without stating it
    success_criteria:
      - Schema-valid script artifact
      - Script sections map to a feasible hybrid structure
    optional_artifacts_in: []
    required_tools: []
    estimated_cost:
      sample:
        usd: 0
        comment: agent-authored planning only
      full:
        usd: 0
        comment: agent-authored planning only
    sample_mode_supported: true
  - slug: scene_plan
    skill: pipelines/hybrid/scene-director.md
    produces: scene_plan
    produces_artifacts:
      - scene_plan
    required_artifacts_in:
      - script
    optional_artifacts_in:
      - brief
    optional_tools:
      - frame_sampler
      - scene_detect
    tools_available:
      - frame_sampler
      - scene_detect
    checkpoint_required: true
    human_approval: required
    human_approval_default: true
    review_focus:
      - Source content remains visually primary where intended
      - Overlay and support layers do not overload the frame
      - Platform or aspect-ratio variants are planned deliberately
    success_criteria:
      - Schema-valid scene_plan artifact
      - Every scene has a defined source/support treatment
    required_tools: []
    estimated_cost:
      sample:
        usd: 0
        comment: agent-authored planning only
      full:
        usd: 0
        comment: agent-authored planning only
    sample_mode_supported: true
  - slug: assets
    skill: pipelines/hybrid/asset-director.md
    produces: asset_manifest
    produces_artifacts:
      - asset_manifest
    required_artifacts_in:
      - scene_plan
    optional_artifacts_in:
      - script
      - brief
    optional_tools:
      - subtitle_gen
      - tts_selector
      - image_selector
      - video_selector
      - diagram_gen
      - code_snippet
      - music_gen
      - audio_enhance
    tools_available:
      - subtitle_gen
      - tts_selector
      - image_selector
      - video_selector
      - diagram_gen
      - code_snippet
      - music_gen
      - audio_enhance
    checkpoint_required: true
    human_approval: optional
    human_approval_default: false
    review_focus:
      - Support assets clearly map to real narrative gaps
      - Shared template assets are reused
      - Optional generated inserts do not eclipse source truth
    success_criteria:
      - Schema-valid asset_manifest artifact
      - All referenced asset files exist on disk
    required_tools: []
    estimated_cost:
      sample:
        usd: 0.25
        comment: sample-scope asset generation or capture
      full:
        usd: 2
        comment: full asset generation, capture, or processing pass
    sample_mode_supported: true
  - slug: edit
    skill: pipelines/hybrid/edit-director.md
    produces: edit_decisions
    produces_artifacts:
      - edit_decisions
    required_artifacts_in:
      - scene_plan
      - asset_manifest
    optional_artifacts_in:
      - script
    checkpoint_required: true
    human_approval: optional
    human_approval_default: false
    review_focus:
      - Anchor cut is coherent before support layers are added
      - Support visuals clarify rather than distract
      - Variant logic is consistent across deliverables
    success_criteria:
      - Schema-valid edit_decisions artifact
      - Edit decisions cover the planned deliverables
    required_tools: []
    optional_tools: []
    tools_available: []
    estimated_cost:
      sample:
        usd: 0
        comment: agent-authored planning only
      full:
        usd: 0
        comment: agent-authored planning only
    sample_mode_supported: true
  - slug: compose
    skill: pipelines/hybrid/compose-director.md
    produces: render_report
    produces_artifacts:
      - render_report
      - final_review
    required_artifacts_in:
      - edit_decisions
      - asset_manifest
    optional_artifacts_in:
      - scene_plan
    required_tools:
      - video_compose
      - audio_mixer
    optional_tools:
      - video_stitch
      - video_trimmer
      - color_grade
      - audio_enhance
    tools_available:
      - video_compose
      - hyperframes_compose
      - audio_mixer
      - video_stitch
      - video_trimmer
      - color_grade
      - audio_enhance
    checkpoint_required: true
    human_approval: optional
    human_approval_default: false
    review_focus:
      - Source and support layers remain balanced
      - Aspect-ratio variants preserve readability
      - Audio stays coherent across footage and generated elements
      - render_runtime in edit_decisions matches proposal_packet — silent swap is a CRITICAL governance violation
      - Hybrid typically uses render_runtime='remotion' so source footage and React support overlays compose in one pass; pick 'hyperframes' only when support layers are HTML/GSAP-native
    success_criteria:
      - Schema-valid render_report artifact
      - Output file exists and passes ffprobe validation
    estimated_cost:
      sample:
        usd: 0.05
        comment: local render validation
      full:
        usd: 0.25
        comment: full render and export pass
    sample_mode_supported: true
  - slug: publish
    skill: pipelines/hybrid/publish-director.md
    produces: publish_log
    produces_artifacts:
      - publish_log
    required_artifacts_in:
      - render_report
      - final_review
    optional_artifacts_in:
      - brief
      - script
    checkpoint_required: true
    human_approval: required
    human_approval_default: true
    review_focus:
      - Hero cut and derivative cuts are clearly organized
      - Metadata reflects the actual source mix
      - Export package is usable without manual cleanup
    success_criteria:
      - Schema-valid publish_log artifact
      - Export package contains video and metadata outputs
    required_tools: []
    optional_tools: []
    tools_available: []
    estimated_cost:
      sample:
        usd: 0
        comment: agent-authored planning only
      full:
        usd: 0
        comment: agent-authored planning only
    sample_mode_supported: true
sample:
  duration_s_min: 12
  duration_s_max: 18
  hint: One source-led beat plus one support visual or overlay.
