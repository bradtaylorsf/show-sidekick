slug: animated-explainer
display_name: Animated Explainer
description: No-key personalized animated explainer starter with a sample script and local narration.
created: 2026-05-14
sample_support: both
brand: ./brand/
characters: ./characters/
skills: ./skills/
pipelines:
  animated-explainer:
    playbook: flat-motion-graphics
    runtime: remotion
    aspect: 9:16
    budget_usd: 0.75
defaults:
  pipeline: animated-explainer
  language: en
ingest:
  episode_template: ./episode.template.yaml
  watch:
    - path: ./inputs/
      match: "**/script.txt"
      pipeline: animated-explainer
      slug_from: parent_dir
starter:
  fixture_size_bytes: 1986
  expected_sample_duration_s: 30
