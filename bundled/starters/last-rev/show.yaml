slug: last-rev
display_name: Last Rev
description: Branded Last Rev starter for screen-demo walkthroughs and talking-head follow-ups.
created: 2026-05-14
sample_support: paid
brand: ./brand/
characters: ./characters/
skills: ./skills/
pipelines:
  screen-demo:
    playbook: clean-professional
    runtime: remotion
    aspect: 16:9
    budget_usd: 0.75
    capture_mode: synthetic_terminal
  talking-head:
    playbook: clean-professional
    runtime: remotion
    aspect: 16:9
    budget_usd: 0.75
defaults:
  pipeline: screen-demo
  language: en
  provider_profile: paid-demo
ingest:
  episode_template: ./episode.template.yaml
  watch:
    - path: ./inputs/
      match: "**/demo-notes.txt"
      pipeline: screen-demo
      slug_from: parent_dir
    - path: ./inputs/
      match: "**/host-script.txt"
      pipeline: talking-head
      slug_from: parent_dir
starter:
  fixture_size_bytes: 436
  expected_sample_duration_s: 15
