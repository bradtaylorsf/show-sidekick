slug: localization-dub
display_name: Localization Dub
description: Transcript-first localization pipeline for producing translated subtitles, dubbed audio, and optional lip-synced language variants from an existing source video. EP orchestration adds quality gates for translation accuracy, timing preservation, and per-locale consistency.
status: beta
master_clock: none
orchestration:
  budget_default_usd: 3
  max_revisions_per_stage: 3
  max_send_backs: 3
  max_wall_time_minutes: 15
stages:
  - slug: source_review
    skill: pipelines/localization-dub/source-review-director.md
    produces: source_media_review
    tools_available:
      - source_media_review
      - transcriber
      - frame_sampler
      - scene_detect
      - video_understand
    review_focus:
      - Source video is probed before translation
      - Speech-bearing sections and on-screen text are identified
      - Localization constraints are explicit before script
    success_criteria:
      - Schema-valid source_media_review artifact for the source video
      - Speech, subtitle, and on-screen text risks are ready for localization planning
    human_approval: optional
  - slug: idea
    skill: pipelines/localization-dub/idea-director.md
    produces: brief
    review_focus:
      - Source language and target languages are explicit
      - Deliverable mode is clear per language
      - Review and glossary requirements are captured
    success_criteria:
      - Schema-valid brief artifact
      - Brief records localization scope and dub mode
    human_approval: required
  - slug: script
    skill: pipelines/localization-dub/script-director.md
    produces: script
    tools_available:
      - transcriber
    review_focus:
      - Transcript truth is strong enough for downstream localization
      - Glossary and protected terms are preserved
      - Target-language script package is reviewable before synthesis
    success_criteria:
      - Schema-valid script artifact
      - Script contains source transcript structure and translated sections
    human_approval: required
  - slug: scene_plan
    skill: pipelines/localization-dub/scene-director.md
    produces: scene_plan
    tools_available:
      - frame_sampler
      - scene_detect
    review_focus:
      - Dub mode is chosen realistically for each deliverable
      - Timing drift and on-screen text risks are mapped
      - Lip-sync use is limited to shots that can support it
    success_criteria:
      - Schema-valid scene_plan artifact
      - Every deliverable has a defined localization treatment
    human_approval: required
  - slug: assets
    skill: pipelines/localization-dub/asset-director.md
    produces: asset_manifest
    tools_available:
      - tts_selector
      - subtitle_gen
      - lip_sync
      - heygen_video
      - audio_enhance
    review_focus:
      - Subtitle and dubbed-audio assets exist for each language
      - Timing and pronunciation risks are recorded
      - Lip-sync remains optional and clearly marked
    success_criteria:
      - Schema-valid asset_manifest artifact
      - All referenced asset files exist on disk
    human_approval: optional
  - slug: edit
    skill: pipelines/localization-dub/edit-director.md
    produces: edit_decisions
    review_focus:
      - Source structure is preserved unless localization timing forces change
      - CTA and legal copy survive translation cleanly
      - Language variants are organized consistently
    success_criteria:
      - Schema-valid edit_decisions artifact
      - Edit decisions cover all planned language outputs
    human_approval: optional
  - slug: compose
    skill: pipelines/localization-dub/compose-director.md
    produces: render_report
    tools_available:
      - video_compose
      - audio_mixer
      - video_trimmer
      - audio_enhance
    review_focus:
      - Each language output is intelligible and correctly timed
      - Subtitle and dub timing match the chosen treatment
      - Version labeling is unambiguous
    success_criteria:
      - Schema-valid render_report artifact
      - Output file exists and passes ffprobe validation
    human_approval: optional
  - slug: publish
    skill: pipelines/localization-dub/publish-director.md
    produces: publish_log
    review_focus:
      - Every language package contains the right assets and metadata
      - Locale labels and titles are consistent
      - Review notes remain attached to the published package
    success_criteria:
      - Schema-valid publish_log artifact
      - Export package contains localized video and metadata outputs
    human_approval: required
