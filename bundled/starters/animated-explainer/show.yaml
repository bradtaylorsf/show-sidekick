slug: animated-explainer
display_name: Animated Explainer
description: Visual-led animated explainer starter with a sample script and reference image fixture.
created: 2026-05-14
sample_support: paid
brand: ./brand/
characters: ./characters/
skills: ./skills/
pipelines:
  animated-explainer:
    playbook: flat-motion-graphics
    runtime: remotion
    aspect: 16:9
    budget_usd: 0.75
defaults:
  pipeline: animated-explainer
  language: en
  provider_profile: paid-demo
ingest:
  episode_template: ./episode.template.yaml
  watch:
    - path: ./inputs/
      match: "**/script.txt"
      pipeline: animated-explainer
      slug_from: parent_dir
starter:
  fixture_size_bytes: 1900
  expected_sample_duration_s: 15
