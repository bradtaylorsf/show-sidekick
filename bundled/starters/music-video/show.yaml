slug: music-video
display_name: "Music Video"
description: "Audio-led vertical music video starter with a synthesized track and lyric fixture."
created: 2026-05-14
brand: ./brand/
characters: ./characters/
skills: ./skills/
pipelines:
  music-video:
    playbook: news-song
    runtime: ffmpeg
    aspect: "9:16"
    budget_usd: 0.5
defaults:
  pipeline: music-video
  language: en
ingest:
  episode_template: ./episode.template.yaml
  watch:
    - path: ./inputs/
      match: "**/track.wav"
      pipeline: music-video
      slug_from: parent_dir
starter:
  fixture_size_bytes: 120213
  expected_sample_duration_s: 15
  pending_pipelines:
    - music-video
