slug: talking-head
display_name: Talking Head
description: Talking-head pipeline for narration-led hosted videos with direct-to-camera delivery, captions, support cards, and simple editorial packaging.
status: beta
sample_support: paid
master_clock: voiceover
default_checkpoint_policy: guided
extensions:
  custom_scripts: true
  custom_playbooks: true
  custom_skills: true
  custom_tools: false
required_skills:
  - pipelines/talking-head/executive-producer.md
  - pipelines/talking-head/idea-director.md
  - pipelines/talking-head/script-director.md
  - pipelines/talking-head/scene-director.md
  - pipelines/talking-head/asset-director.md
  - pipelines/talking-head/edit-director.md
  - pipelines/talking-head/compose-director.md
  - pipelines/talking-head/publish-director.md
  - meta/reviewer
  - meta/checkpoint-protocol
compatible_playbooks:
  recommended:
    - clean-professional
  also_works:
    - flat-motion-graphics
  custom_allowed: true
orchestration:
  mode: executive-producer
  skill: pipelines/talking-head/executive-producer.md
  budget_default_usd: 1
  max_revisions_per_stage: 2
  max_send_backs: 2
  max_wall_time_minutes: 20
sample:
  duration_s_min: 12
  duration_s_max: 20
  max_scenes: 2
  max_cost_usd: 0.9
  hint: One hosted paragraph, caption pass, and one support card.
export:
  supported_targets:
    - premiere
    - davinci
    - capcut
    - edl
  default_target: premiere
  notes: Export packages include edit decisions, linked assets, render notes, and NLE handoff metadata.
stages:
  - slug: idea
    skill: pipelines/talking-head/idea-director.md
    produces: brief
    produces_artifacts:
      - brief
    required_artifacts_in: []
    optional_artifacts_in: []
    required_tools: []
    optional_tools: []
    tools_available: []
    checkpoint_required: true
    sample_mode_supported: true
    review_focus:
      - Idea output fits the talking-head lane
      - Assumptions, risks, and handoff details are explicit
    success_criteria:
      - Schema-valid brief artifact
      - Idea handoff is ready for the next stage
    estimated_cost:
      sample:
        usd: 0
        comment: agent-authored planning only
      full:
        usd: 0
        comment: agent-authored planning only
    human_approval: required
