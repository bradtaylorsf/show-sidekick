slug: clip-factory
display_name: Clip Factory
description: General clip-factory starter for turning long-form source footage into short platform cuts.
created: 2026-05-14
sample_support: unsupported
brand: ./brand/
characters: ./characters/
skills: ./skills/
pipelines:
  clip-factory:
    playbook: clean-professional
    runtime: ffmpeg
    aspect: 9:16
